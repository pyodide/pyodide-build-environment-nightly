name: Deploy nightly environments metadata to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "nightly-cross-build-environments-release.json"
      - "nightly-cross-build-environments-debug.json"
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build GitHub Pages artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      # We don't actually have a v1 API here, just that we do it to be in line with the
      # non-nightly metadata in the pyodide/pyodide GitHub Pages job/site
      - name: Prepare GitHub Pages content
        run: |
          mkdir -p _site/api/v2
          cp nightly-cross-build-environments-release.json _site/api/v2/release.json
          cp nightly-cross-build-environments-debug.json   _site/api/v2/debug.json
          cp docs/index.html _site/index.html

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      pages: write # Required to deploy to GitHub Pages
      id-token: write # Required for OIDC token used by the deploy-pages action
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
