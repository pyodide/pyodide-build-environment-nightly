name: Release Cross-build environment

on:
  schedule:
    # Run daily at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      branch:
        description: "The branch to build"
        default: "main"
        required: false
      release_version:
        description: "Required. The version to release, used as the tag and release name (for example 20260608). It must not match an existing tag, so if you're re-running this on the same day to fix a broken nightly, use something like 20260608-1 instead."
        required: true
      python_version:
        description: "The Python version to use"
        default: "3.14"
        required: false

permissions: {}

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Pyodide cross-build environment
    permissions:
      contents: read
    uses: ./.github/workflows/build-xbuildenv.yml
    with:
      branch: ${{ github.event.inputs.branch || 'main' }}
      python-version: ${{ github.event.inputs.python_version || '3.14' }}

  publish:
    name: Publish cross-build environments
    runs-on: ubuntu-latest
    needs: [build]
    if: >-
      github.repository == 'pyodide/pyodide-build-environment-nightly'
    permissions:
      id-token: write # Required to sign the attestations
      attestations: write # Required to sign the attestations
      contents: write # Required to upload to a GitHub release identifier
      actions: write # Required to trigger the GitHub Pages deployment workflow
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cross-build-env
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cross-build-env-debug
          path: dist
          merge-multiple: true

      - name: Generate attestations
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/xbuildenv.tar.bz2
            dist/xbuildenv-debug.tar.bz2

      - name: Calc release version
        id: release_version
        shell: bash
        run: |
          if [[ $GITHUB_EVENT_NAME == 'schedule' ]]; then
            echo "release_version=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          else
            echo "release_version=${GITHUB_EVENT_INPUTS_RELEASE_VERSION}" >> $GITHUB_OUTPUT
          fi

          cat $GITHUB_OUTPUT
        env:
          GITHUB_EVENT_INPUTS_RELEASE_VERSION: ${{ github.event.inputs.release_version }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Verify them, to ensure that the wheels they were attested correctly
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          gh attestation verify dist/xbuildenv.tar.bz2 --repo $GITHUB_REPOSITORY
          gh attestation verify dist/xbuildenv-debug.tar.bz2 --repo $GITHUB_REPOSITORY

      - name: Create and push tag
        run: |
          git config --global user.name "Pyodide CI"
          git config --global user.email "actions@github.com"
          TAG_NAME=${STEPS_RELEASE_VERSION_OUTPUTS_RELEASE_VERSION}
          git tag $TAG_NAME
          git push origin $TAG_NAME
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STEPS_RELEASE_VERSION_OUTPUTS_RELEASE_VERSION: ${{ steps.release_version.outputs.release_version }}

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Generate release notes
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.release_version }}
        run: |
          uv run tools/generate_release_notes.py \
            "$RELEASE_VERSION" \
            dist/xbuildenv.tar.bz2 \
            dist/xbuildenv-debug.tar.bz2 \
            > release-notes.md

      - name: Create GitHub release with these wheels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.release_version.outputs.release_version }}
        run: |
          gh release create "$RELEASE_VERSION" dist/*.tar.bz2 \
            --title "$RELEASE_VERSION" \
            --notes-file release-notes.md

      - name: Update cross-build environments metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.release_version.outputs.release_version }}
        run: uv run tools/update_nightly_cross_build_releases.py "$VERSION"

      - name: Commit and push metadata updates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.release_version.outputs.release_version }}
        run: |
          gh auth setup-git

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add nightly-cross-build-environments-release.json nightly-cross-build-environments-debug.json
          git commit -m "Scheduled update for nightly  ${VERSION} xbuildenvs metadata [skip ci]"
          git push origin main

      - name: Deploy GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main
